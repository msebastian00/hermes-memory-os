paths:
  base_dir: ${HERMES_MEMORY_HOME}
  vault_dir: ${HERMES_MEMORY_HOME}/vault
  sqlite_path: ${HERMES_MEMORY_HOME}/db/memory.sqlite
  logs_dir: ${HERMES_MEMORY_HOME}/logs

wiki_brain:
  enabled: true
  paths: []

qdrant:
  enabled: false
  url: http://localhost:6333
  vector_size: 768
  distance: Cosine
  collections:
    memories: hermes_memories
    wiki: hermes_wiki
    captures: hermes_captures
    sources: hermes_sources
    agent_learning: hermes_agent_learning

embeddings:
  provider: none
  base_url: http://localhost:11434
  model: nomic-embed-text
  dimension: 768

retrieval:
  max_injected: 8
  min_final_score: 0.35
  weights:
    semantic: 0.45
    keyword: 0.20
    entity: 0.15
    scope: 0.10
    recency: 0.05
    trust: 0.05

privacy:
  cloud_allowed: false
  never_send_raw_events_to_cloud: true

self_learning:
  enabled: true
  mode: log_and_review
